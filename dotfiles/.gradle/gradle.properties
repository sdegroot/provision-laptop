# Gradle daemon JVM settings — 8GB heap for large multi-module builds
org.gradle.jvmargs=-Xmx8g -XX:+UseZGC -XX:+ZGenerational

# Parallel project execution
org.gradle.parallel=true

# Build cache (local)
org.gradle.caching=true

# Configuration cache — caches the configuration phase across builds
org.gradle.configuration-cache=true

# Kotlin compiler daemon — 4GB heap
kotlin.daemon.jvmargs=-Xmx4g -XX:+UseZGC -XX:+ZGenerational

# File system watching — avoids re-scanning the entire project tree
org.gradle.vfs.watch=true
