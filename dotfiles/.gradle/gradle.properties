# Gradle daemon JVM settings — 8GB heap for large multi-module builds
# java.io.tmpdir on /tmp (tmpfs) keeps compiler scratch files in RAM.
org.gradle.jvmargs=-Xmx8g -XX:+UseZGC -XX:+ZGenerational -Djava.io.tmpdir=/tmp

# Parallel project execution
org.gradle.parallel=true

# Build cache (local)
org.gradle.caching=true


# Kotlin compiler daemon — 4GB heap
kotlin.daemon.jvmargs=-Xmx4g -XX:+UseZGC -XX:+ZGenerational -Djava.io.tmpdir=/tmp

# File system watching — avoids re-scanning the entire project tree
org.gradle.vfs.watch=true
