# Increase inotify watches for IDEs and file watchers
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024

# TCP BBR congestion control (better throughput + lower latency)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# With zram as the primary high-priority swap tier, higher swappiness tells
# the kernel to move cold pages into compressed RAM sooner rather than
# evicting file caches. This is the recommended setting for zram setups.
vm.swappiness = 150

# Keep filesystem metadata (dentries/inodes) cached longer in RAM.
# Default 100 reclaims caches aggressively; 50 biases toward keeping them,
# which speeds up repeated file access, directory traversal, IDE indexing,
# and git operations. Safe with 93GB RAM.
vm.vfs_cache_pressure = 50

# Dirty page writeback tuning — with 93GB RAM the defaults (20%/10%) allow
# tens of GB of dirty pages to accumulate, causing bursty I/O stalls when
# the kernel finally flushes. Lower ratios give smoother write-back.
vm.dirty_ratio = 5
vm.dirty_background_ratio = 2
