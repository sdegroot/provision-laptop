# Netbird account definitions
# Format: name:op-ref
#
# name:   short label used with `bin/netbird up <name>`
# op-ref: 1Password item reference for the setup key
#         To find the right reference:
#           op item get "Netbird Work" --fields credential --reveal
#
# Examples:
# work:op://Work/Netbird Work/credential
# home:op://Personal/Netbird Home/credential
