# Third-party RPM repository definitions
# Format: type url-or-name
# Types: repofile, rpmfusion-free, rpmfusion-nonfree, copr

# Tuxedo hardware drivers (fan control, keyboard backlight, EC interface — x86_64 only)
[x86_64] repofile https://rpm.tuxedocomputers.com/fedora/tuxedo.repo

# RPM Fusion (needed for VA-API freeworld codecs)
rpmfusion-free
rpmfusion-nonfree

# Ghostty terminal
copr scottames/ghostty

# Netbird VPN (URL no longer serves a .repo file, ship locally)
repofile repos.d/netbird.repo
