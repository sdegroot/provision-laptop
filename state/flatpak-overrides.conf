# Flatpak permission overrides
# Format: app_id permission_type permission_value
#
# Permission types:
#   filesystem  — grant filesystem access (maps to --filesystem=)
#   env         — set environment variable (maps to --env=)
#
# Note: Flatpak does NOT expand shell variables ($HOME, $PATH) in env overrides.
#       Use filesystem overrides for paths; configure PATH inside the app instead.
#
# Applied with: flatpak override --user

# IntelliJ needs access to mise-managed SDKs (all runtimes: java, node, python, go)
# Configure PATH to mise shims inside IntelliJ: Settings > Build > Build Tools or terminal profile.
com.jetbrains.IntelliJ-IDEA-Ultimate filesystem ~/.local/share/mise:ro
com.jetbrains.IntelliJ-IDEA-Ultimate filesystem ~/.jdks:ro
