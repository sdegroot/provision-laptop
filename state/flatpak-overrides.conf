# Flatpak permission overrides
# Format: app_id permission_type permission_value
#
# Permission types:
#   filesystem  — grant filesystem access (maps to --filesystem=)
#   env         — set environment variable (maps to --env=)
#
# Applied with: flatpak override --user

# IntelliJ needs access to mise-managed SDKs and the ~/.jdks discovery dir
com.jetbrains.IntelliJ-IDEA-Ultimate filesystem ~/.local/share/mise:ro
com.jetbrains.IntelliJ-IDEA-Ultimate filesystem ~/.jdks:ro
