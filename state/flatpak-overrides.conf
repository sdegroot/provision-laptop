# Flatpak permission overrides
# Format: app_id permission_type permission_value
#
# Permission types:
#   filesystem  — grant filesystem access (maps to --filesystem=)
#   env         — set environment variable (maps to --env=)
#
# Note: Flatpak does NOT expand shell variables in env overrides natively.
#       The apply script expands $HOME and $PATH before passing to flatpak.
#
# Applied with: flatpak override --user

# IntelliJ needs access to mise-managed SDKs (all runtimes: java, node, python, go)
com.jetbrains.IntelliJ-IDEA-Ultimate filesystem ~/.local/share/mise:ro
com.jetbrains.IntelliJ-IDEA-Ultimate filesystem ~/.jdks:ro

# Mise shims on PATH so IntelliJ can find node, python, go, etc.
com.jetbrains.IntelliJ-IDEA-Ultimate env PATH=$HOME/.local/share/mise/shims:$PATH

# Firefox needs access to host policies for managed extensions (1Password)
org.mozilla.firefox filesystem /etc/firefox/policies:ro
